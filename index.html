<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hatakodum.com | AI Teknik Asistan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 1); }
        .loader { border-top-color: #2563eb; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-50 px-6 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">H</div>
                <span class="text-xl font-bold tracking-tight text-slate-900">hatakodum<span class="text-blue-600">.com</span></span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl mx-auto px-4 py-12 w-full">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-slate-900 mb-4">Hata Kodun Ne Diyor?</h1>
            <p class="text-lg text-slate-600">Cihaz markası ve hata kodunu yazın, AI anında analiz etsin.</p>
        </div>

        <!-- Search Form -->
        <div class="glass-panel p-6 rounded-2xl flex flex-col md:flex-row gap-4 mb-12 shadow-lg">
            <div class="flex-1">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Marka / Cihaz</label>
                <input id="brandInput" type="text" placeholder="Örn: Beko, Bosch, VW..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div class="flex-1">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Hata Kodu</label>
                <input id="codeInput" type="text" placeholder="Örn: E18, P0300..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <button id="searchBtn" class="md:self-end px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2">
                <i data-lucide="search" class="w-5 h-5"></i> Sorgula
            </button>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden flex flex-col items-center justify-center py-12 space-y-4">
            <div class="loader w-12 h-12 border-4 border-slate-200 rounded-full"></div>
            <p class="text-slate-500 font-medium">AI Teknik Servis Analiz Ediyor...</p>
        </div>

        <!-- Result Area -->
        <div id="resultArea" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 space-y-6">
                    <div class="glass-panel p-8 rounded-2xl shadow-sm">
                        <div class="flex items-center gap-3 mb-4">
                            <i data-lucide="alert-triangle" class="w-6 h-6 text-blue-600"></i>
                            <h2 class="text-2xl font-bold">Sorun Özeti</h2>
                        </div>
                        <p id="problemSummary" class="text-lg text-slate-700 leading-relaxed"></p>
                    </div>
                    <div class="glass-panel p-8 rounded-2xl shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <i data-lucide="check-circle-2" class="w-6 h-6 text-green-600"></i>
                            <h2 class="text-2xl font-bold">Çözüm Adımları</h2>
                        </div>
                        <ul id="diySolutions" class="space-y-4"></ul>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="glass-panel p-6 rounded-2xl bg-amber-50 border-amber-100">
                        <div class="flex items-center gap-2 mb-3 text-amber-700 font-bold">
                            <i data-lucide="shield-alert" class="w-5 h-5"></i> Güvenlik Uyarısı
                        </div>
                        <p id="safetyWarning" class="text-sm text-amber-800"></p>
                    </div>
                    <div class="glass-panel p-6 rounded-2xl">
                        <div class="font-bold mb-3 flex items-center gap-2"><i data-lucide="wrench" class="w-4 h-4"></i> Aletler</div>
                        <div id="toolsList" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="glass-panel p-6 rounded-2xl">
                        <div class="font-bold mb-1 flex items-center gap-2"><i data-lucide="banknote" class="w-4 h-4"></i> Tahmini Maliyet</div>
                        <p id="costEstimate" class="text-2xl font-bold text-blue-600"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 border-t border-slate-200 bg-white text-center text-slate-400 text-sm">
        <p>© 2026 hatakodum.com - AI Destekli Teknik Asistan</p>
    </footer>

    <!-- Gemini SDK & Logic -->
    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";

        // İkonları Başlat
        lucide.createIcons();

        // API Anahtarı (Vite tarafından veya manuel olarak doldurulur)
        const API_KEY = process.env.GEMINI_API_KEY || "BURAYA_API_KEY_GELECEK";

        const genAI = new GoogleGenAI(API_KEY);
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: "Sen 'hatakodum.com' sitesinin uzman teknisyenisin. Marka ve hata kodunu analiz et. Yanıtı mutlaka şu JSON formatında ver: { \"brand\": \"\", \"errorCode\": \"\", \"problemSummary\": \"\", \"diySolutions\": [\"\", \"\"], \"requiredTools\": [\"\", \"\"], \"safetyWarning\": \"\", \"estimatedRepairCost\": \"\" }"
        });

        const searchBtn = document.getElementById('searchBtn');
        const loadingState = document.getElementById('loadingState');
        const resultArea = document.getElementById('resultArea');

        searchBtn.addEventListener('click', async () => {
            const brand = document.getElementById('brandInput').value;
            const code = document.getElementById('codeInput').value;

            if (!brand || !code) return alert("Lütfen marka ve hata kodunu girin.");

            // UI Hazırla
            searchBtn.disabled = true;
            loadingState.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                const prompt = `Cihaz: ${brand}, Hata Kodu: ${code}`;
                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();
                
                // JSON Temizleme (Bazen AI ```json ... ``` içinde verebilir)
                const jsonStr = text.replace(/```json|```/g, "").trim();
                const data = JSON.parse(jsonStr);

                // Verileri Yerleştir
                document.getElementById('problemSummary').innerText = data.problemSummary;
                document.getElementById('safetyWarning').innerText = data.safetyWarning;
                document.getElementById('costEstimate').innerText = data.estimatedRepairCost;

                // Liste Elemanları
                const solutionsList = document.getElementById('diySolutions');
                solutionsList.innerHTML = data.diySolutions.map((s, i) => `
                    <li class="flex gap-4">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500">${i+1}</span>
                        <p class="text-slate-700 pt-1">${s}</p>
                    </li>
                `).join('');

                const toolsList = document.getElementById('toolsList');
                toolsList.innerHTML = data.requiredTools.map(t => `
                    <span class="px-3 py-1 bg-slate-100 text-slate-600 text-xs rounded-full font-medium">${t}</span>
                `).join('');

                // Sonucu Göster
                loadingState.classList.add('hidden');
                resultArea.classList.remove('hidden');
                lucide.createIcons(); // Yeni ikonlar için tekrar çalıştır

            } catch (error) {
                console.error(error);
                alert("Analiz sırasında bir hata oluştu. Lütfen API anahtarınızı kontrol edin.");
            } finally {
                searchBtn.disabled = false;
                loadingState.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
